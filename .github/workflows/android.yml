name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: transkript-apk

    steps:
      - name: Projeyi çek
        uses: actions/checkout@v4

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Gradle 8.7 kur
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Debug APK build
        run: gradle assembleDebug --stacktrace

      - name: APK dosyalarını listele
        run: find . -type f | grep ".apk" || true

      - name: APK yükle
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: transkript-apk/app/build/outputs/apk/debug/*.apk
