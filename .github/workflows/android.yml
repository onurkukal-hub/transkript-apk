name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Projeyi çek
        uses: actions/checkout@v4

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Gradle 8.7 kur
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Klasör yapısını göster
        run: |
          echo "PWD:"
          pwd
          echo "ROOT LIST:"
          ls -la
          echo "TOP 4 LEVEL FILES:"
          find . -maxdepth 4 -type f | sort

      - name: Gradle dosyalarını bul
        run: |
          echo "settings.gradle / settings.gradle.kts:"
          find . \( -name "settings.gradle" -o -name "settings.gradle.kts" \) | sort
          echo "build.gradle / build.gradle.kts:"
          find . \( -name "build.gradle" -o -name "build.gradle.kts" \) | sort
          echo "gradlew:"
          find . -name "gradlew" | sort || true

      - name: Kökten build dene
        run: gradle assembleDebug --stacktrace --info

      - name: APK dosyalarını listele
        if: always()
        run: find . -type f | grep "\.apk" || true

      - name: APK yükle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            app/build/outputs/apk/debug/*.apk
            */app/build/outputs/apk/debug/*.apk
            */*/app/build/outputs/apk/debug/*.apk
